<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker</title>
</head>
<body>
    <h1>🏃 Tracker Allenamenti</h1>

    <form id="form">
        <label>Km:</label>
        <input type="number" id="km" required><br><br>

        <label>Tempo (min):</label>
        <input type="number" id="time" required><br><br>

        <button type="submit">Salva</button>
    </form>

    <h2>Storico</h2>
    <ul id="list"></ul>

    <h2>Punti: <span id="points">0</span></h2>

    <script src="app.js"></script>
</body>
</html>
